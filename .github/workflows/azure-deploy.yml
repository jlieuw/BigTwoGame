name: Build and deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  TOFU_VERSION: "1.9.1"
  BACKEND_IMG:  bigtwo-backend
  FRONTEND_IMG: bigtwo-frontend

# Pipeline (main branch): plan → apply-base → build → apply-apps
#
# apply-base uses -target to provision only the resource group, ACR, and
# Container Apps environment.  This guarantees the ACR exists before build
# tries to push images to it, and that the container apps are only created
# after their images are already available in the registry.
#
# PRs run only the plan step so diffs are visible without touching Azure.

jobs:
# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — plan (always)
# Shows infrastructure diff on every push and PR.
# ──────────────────────────────────────────────────────────────────────────────
  plan:
    name: OpenTofu plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu init
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        run: |
          tofu init -input=false \
            -backend-config="storage_account_name=${{ secrets.AZURE_STATE_STORAGE_ACCOUNT }}"

      - name: Tofu validate
        working-directory: infra/azure-tofu
        run: tofu validate

      - name: Tofu plan
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_location:        ${{ secrets.AZURE_LOCATION }}
          TF_VAR_image_tag:             ${{ github.sha }}
        run: tofu plan -input=false

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — apply-base (main only, after plan)
# Creates the resource group, ACR, and Container Apps environment.
# Uses -target so container apps are NOT created yet (images don't exist yet).
# ──────────────────────────────────────────────────────────────────────────────
  apply-base:
    name: OpenTofu apply (base infra)
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu init
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        run: |
          tofu init -input=false \
            -backend-config="storage_account_name=${{ secrets.AZURE_STATE_STORAGE_ACCOUNT }}"

      - name: Tofu apply base infra
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_location:        ${{ secrets.AZURE_LOCATION }}
          TF_VAR_image_tag:             ${{ github.sha }}
        run: |
          tofu apply -auto-approve -input=false \
            -target=random_id.acr \
            -target=azurerm_resource_group.main \
            -target=azurerm_container_registry.main \
            -target=azurerm_container_app_environment.main

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — build (main only, after apply-base)
# ACR is guaranteed to exist now. Gets the login server from tofu output
# instead of az acr list so there is no dependency on the Azure CLI.
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: [apply-base]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu init
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        run: |
          tofu init -input=false \
            -backend-config="storage_account_name=${{ secrets.AZURE_STATE_STORAGE_ACCOUNT }}"

      - name: Get ACR login server
        id: acr
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        run: |
          SERVER=$(tofu output -raw acr_login_server)
          echo "server=$SERVER" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.server }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend/BigTwo.Api
          push: true
          tags: |
            ${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:${{ github.sha }}
            ${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:latest
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:cache
          cache-to:   type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:cache,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:${{ github.sha }}
            ${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:latest
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:cache
          cache-to:   type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:cache,mode=max

# ──────────────────────────────────────────────────────────────────────────────
# Job 4 — apply-apps (main only, after build)
# Images now exist in ACR. Applies the full config to create/update the
# container apps with the correct image tag.
# ──────────────────────────────────────────────────────────────────────────────
  apply-apps:
    name: OpenTofu apply (container apps)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu init
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        run: |
          tofu init -input=false \
            -backend-config="storage_account_name=${{ secrets.AZURE_STATE_STORAGE_ACCOUNT }}"

      - name: Tofu apply
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_location:        ${{ secrets.AZURE_LOCATION }}
          TF_VAR_image_tag:             ${{ github.sha }}
        run: tofu apply -auto-approve -input=false

      - name: Print app URL
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_location:        ${{ secrets.AZURE_LOCATION }}
        run: |
          URL=$(tofu output -raw frontend_url)
          echo "### Deployed to $URL" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
