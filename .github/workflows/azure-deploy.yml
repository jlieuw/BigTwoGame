name: Build and deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  TOFU_VERSION: "1.9.1"
  BACKEND_IMG:  bigtwo-backend
  FRONTEND_IMG: bigtwo-frontend

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — plan (parallel with build)
# Shows infrastructure diff on every push and PR.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  plan:
    name: OpenTofu plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu init
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        run: |
          tofu init -input=false \
            -backend-config="storage_account_name=${{ secrets.AZURE_STATE_STORAGE_ACCOUNT }}"

      - name: Tofu validate
        working-directory: infra/azure-tofu
        run: tofu validate

      - name: Tofu plan
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_location:        ${{ secrets.AZURE_LOCATION }}
          TF_VAR_image_tag:             ${{ github.sha }}
        run: tofu plan -input=false -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-tfplan
          path: infra/azure-tofu/tfplan
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Job 2 — build (parallel with plan)
# Builds and pushes images to ACR using commit SHA + latest tags.
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build and push images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId":       "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":   "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":       "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Get ACR login server
        id: acr
        run: |
          SERVER=$(az acr list --resource-group bigtwo-rg --query "[0].loginServer" -o tsv)
          echo "server=$SERVER" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.acr.outputs.server }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend/BigTwo.Api
          push: true
          tags: |
            ${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:${{ github.sha }}
            ${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:latest
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:cache
          cache-to:   type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.BACKEND_IMG }}:cache,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:${{ github.sha }}
            ${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:latest
          cache-from: type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:cache
          cache-to:   type=registry,ref=${{ steps.acr.outputs.server }}/${{ env.FRONTEND_IMG }}:cache,mode=max

# ──────────────────────────────────────────────────────────────────────────────
# Job 3 — apply (main branch only, after plan AND build pass)
# Applies the saved plan — infra is updated and containers redeployed.
# ──────────────────────────────────────────────────────────────────────────────
  apply:
    name: OpenTofu apply
    runs-on: ubuntu-latest
    needs: [plan, build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu init
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
        run: |
          tofu init -input=false \
            -backend-config="storage_account_name=${{ secrets.AZURE_STATE_STORAGE_ACCOUNT }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-tfplan
          path: infra/azure-tofu

      - name: Tofu apply
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_location:        ${{ secrets.AZURE_LOCATION }}
          TF_VAR_image_tag:             ${{ github.sha }}
        run: tofu apply -input=false tfplan

      - name: Print app URL
        working-directory: infra/azure-tofu
        env:
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET:   ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_azure_location:        ${{ secrets.AZURE_LOCATION }}
        run: |
          URL=$(tofu output -raw frontend_url)
          echo "### Deployed to $URL" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
