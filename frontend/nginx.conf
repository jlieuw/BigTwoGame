server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy SignalR WebSocket + HTTP negotiation to the backend.
    # BACKEND_URL is substituted at container start via envsubst.
    # Docker Compose  : http://backend:5000
    # Scaleway        : https://<container-name>.<hash>.fnc.fr-par.scw.cloud
    location /gamehub {
        proxy_pass              ${BACKEND_URL};
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "Upgrade";
        proxy_set_header        Host       $host;
        proxy_cache_bypass      $http_upgrade;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        # Required when proxy_pass target is HTTPS (Scaleway, etc.)
        proxy_ssl_server_name   on;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
